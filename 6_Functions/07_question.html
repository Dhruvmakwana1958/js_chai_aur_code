<body>
    <script>
        function countVovels(str){
        count = 0 ;
        
        let vovels = "aeiou"
        let foundVovels = [] ;
        for(let ch of str.toLowerCase()){
            if(vovels.includes(ch)) {//<-jemathi chek kaarvanu(apna college)
            //    ^             ^ m ,a ,k ,w , a (nani string)
            // je chek karvanu (moti string)
            foundVovels.push(ch);
            count ++ ;
            }
        }
        console.log(`Total vovels : ${count}`);
        console.log(`vovels found : ${foundVovels.join(", ")}`);
                       // OR
        console.log(`vovels found : ${(foundVovels)}`);
    }
    </script>
