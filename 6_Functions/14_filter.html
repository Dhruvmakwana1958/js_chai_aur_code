<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let arr = [4, 5, 2, 8, 35, 11, 22];
        let newArray = arr.filter((val) => {
            return val % 2 == 0;

        });
        let new2array = arr.filter((val) => {
            return val % 2 !== 0;
        });

        console.log(newArray);
        console.log(new2array);
    </script>
</body>

</html>
