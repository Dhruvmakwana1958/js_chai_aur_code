<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // forEach method ne higher order function(HOF) / higher order method(HOM) kehvama ave che
        // array na element ne one by one print karva ane teno upyog che jem ke one by one elements ne uppercase ma priint karva
        let arr = ["Delhi" , "Pune" , "Jarkhand" ,"Dehradun"]
        
        arr.forEach((val) => {
            console.log(val.toUpperCase());
        });
    </script>
</body>
</html>
