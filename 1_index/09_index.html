<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // Date - object

        // // // hal ni date dekhadva mate
        let myDate = new Date();
        console.log(myDate); // Fri Feb 20 2026 01:11:31 GMT+0530 (India Standard Time)
        console.log(myDate.toString()); // Fri Feb 20 2026 01:11:51 GMT+0530 (India Standard Time)
        console.log(myDate.toDateString()); // Fri Feb 20 2026
        console.log(myDate.toTimeString()); //01:15:13 GMT+0530 (India Standard Time)
        console.log(myDate.toLocaleString()); // 2/20/2026, 1:12:32 AM
        console.log(myDate.toLocaleDateString()); // 2/20/2026
        console.log(myDate.toLocaleTimeString());
        console.log(myDate.getDay());
        /*0 = Sunday
          1 = Monday
          2 = Tuesday
          3 = Wednesday
          4 = Thursday
          5 = Friday
          6 = Saturday
        */

        console.log(myDate.getMonth() + 1)
        console.log(myDate.getFullYear());  

        console.log(myDate.toLocaleString("default", {
            weekday: "long" ,// ctrl + space devathi propertys show thy jse
            minute:"2-digit"

        }))


        //apde create kareli date show karva
        let myCreatedDate = new Date(2023, 1, 23); // ahi month nu starting 0 thi thy to jo 0 lakhisu to january dekhadse , 11 karvi to december 
        // YY / MM / DD vado concept hoy che
        console.log(myCreatedDate.toDateString());

        let mynewdate = new Date(2006, 2, 23, 1, 3)
        console.log(mynewdate.toLocaleString());

        let indian = new Date("04-30-2008"); /*jo sting formate ma lkhvi to month 1 thi start thse */
        console.log(indian.toLocaleString())

        console.log(indian.toLocaleString("default", {
            weekday: "long"
        }))






        // koi pan specific date mate teni detail leva mate 
        let myperd = new Date("2022-04-17")
        console.log(myperd.toLocaleString("default", {   /*aa rite lakhisu to output */
            month: "numeric",
            day: "2-digit",                            /*17 Sunday 2022 aa rite ak line ma avse */
            weekday: "long",
            year: "numeric"
        }))

    </script>
</body>

</html>
