<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let score = prompt("Enter student score");

        if(score >=90 && score<=100){
            prompt("your score is "+score +" & you gets A Grade !");
        }
        else if(score >=70 && score<=89){
            prompt("your score is "+score +" & you gets B Grade !");
        }
        else if(score >=60 && score<=69){
            prompt("your score is "+score +" & you gets C Grade !");
        }
        else if(score >=50 && score<=59){
            prompt("your score is "+score +" & you gets D Grade !");
        }
        else{
            prompt("You fail in the exam !");
        }
        

    </script>
</body>
</html>
