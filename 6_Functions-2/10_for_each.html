<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let arr = ["Dilhi" , "ludhiyana" , "lahor" , "kashmir"];
        //foreach loop na 3 parametere hoy che value , index , array (itself)
        arr.forEach((val , index , arr) => {
            console.log(val.toUpperCase() , index , arr);
        })

// **********************************************************************************************************************************
// apde alag thi function declare kari ne foreach ma teno reference api ne pan execute kari sakay 
const newarr = ["cpp" , "javascript" , "ruby" , "rail" , "swift"]

const lanname = (val)=>{
    console.log(val.toUpperCase());
}
newarr.forEach(lanname); // ahi apde lanname()  rite na lakhvu 

    </script>
</body>
</html>
