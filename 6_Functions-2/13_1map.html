<body>
    <script>
        let arr = [2, 3, 4, 5];
        arr.map((val) => {     // ana thi navo array ny bane navo array banava ane variable ma store karvu pde
            console.log(val);
        });

        let newarr = arr.map((val) =>{
            return val**2;
        });
        console.log(newarr); // basically map returns new array ane e vara farti array na element ne iterate kare che , ane ani size (length)
        //original array jetli hoy
        console.log(arr); // orignial array same j che

        // tuk ma foreach ma apde retun no use na kari sakiae ane ama kari sakiae ane tena use thi apde navo j array banavi sakiaa
    </script>
</body>
