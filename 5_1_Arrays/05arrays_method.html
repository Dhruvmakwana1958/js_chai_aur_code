    <script>
        
let arr = [0,1,2,3,4,5,6,7] ;

        console.log(arr.splice(3,1)) ; //original array ma change thy

        console.log(arr); 

        arr.splice(2 , 2 , 202 ,"dhruv");

        //slice and splice method available in both array and strings
        let name = "Shuddhi Nimbark"
        console.log(name.slice(8,15))


        let months = ["January", "July", "March", "August"];
        months.splice(0, 1, "July", "June");
        console.log(months);
