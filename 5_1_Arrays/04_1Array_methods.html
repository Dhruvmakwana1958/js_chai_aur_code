<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /* arrays ma ak vastu yad rakhvi ke console.log(items.push("mango")) aa rit khoti che
        pela alag line ma pop() karavanu pachi ene alag line ma console kari ne print karavanu 
        ane je  string/array navo j array apto hoy original array ma ferfar na karto hoy to ene console kari ne e j same line 
        ma print karvu pela items.toString kari ane pachi niche ni line ma console kari ne print na karvu*/

        let items = ["potato" ,"Apple" ,"Litchi" ,"Tomato"];
        let marks = [94 ,87 ,65 ,77];
        let heros = ["spiderman" , "Thor"];

        // items.push("mango" , "kiwi")
        
        console.log(items); // --------> gives changes in  array
        console.log(items.includes("Tomato")) 
        console.log(items.indexOf("Tomato"))

      
        let deleteditems = items.pop();
        console.log(items);    //-------> gives changes in array
        console.log(deleteditems);

        
        console.log(marks.toString()); // ----> gives new array do not change in original 

        console.log(items.concat(marks)); //--->  gives new array
        console.log(heros.concat(marks,items));
        // OR 
        // let allitems = items.concat(marks);
        // console.log(allitems);

        heros.unshift("Arjun"); // aagd add thy , but industies ma aa ak kharab method che ane program ni optimization reduce kare che because 
        console.log(heros);       //sav thi aagd add thy che teno matlb che ke badhi values ne shift karvi padi (computer ne load ave che)

        let del_Heroes = heros.shift(); // aagd thi delete thy
        console.log(heros);
        console.log(del_Heroes);

        console.log(items.slice(1,3)) // ama original element change na thy 
        console.log(items.slice()); //use for copy arrays
        
    </script>
</body>
</html>
