        /* insert elements 
        1) node.apend(el) adds a end of nodes (inside)
        2) node.prepend(el) adds a start of the node (inside)
        3)node.before(el) add before the node (outside)
        4)node.after(el) add after the node (outside)
        */  

// to insert element first step is to create and second step is to add

        let newbtn = document.createElement("button");
        newbtn.innerText = "click me!" ;
        console.log(newbtn); 

        // let div = document.querySelector("div");
        // div.append(newbtn);

        // let newdiv = document.querySelector("div");
        // newdiv.prepend(newbtn);
        
        let newerdiv = document.querySelector("div");
        newerdiv.before(newbtn);
        
        let newestdiv = document.querySelector("p");
        newestdiv.after(newbtn);
