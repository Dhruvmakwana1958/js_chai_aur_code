
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
<script>
// 25 ma folder no 7 mo video farajiyat jovo (this with arrow function)
const student = {
    name: "aman",
    marks: 95,
    prop: this, // global scope

    getName: function () {
        console.log(this);
        return this.name;
    },

    getMarks: () => {
        console.log(this); // parent's scope -> window
        return this.marks;
    },

    getInfo1: function () {
        setTimeout(() => {
            console.log(this); // student
        }, 2000);
    },

    getInfo2: function () {
        setTimeout(function () {
            console.log(this); // window
        }, 2000);
    }
};

// Function calls
student.getName();
student.getMarks();
student.getInfo1();
student.getInfo2();
            
</script>
</body>
</html>
