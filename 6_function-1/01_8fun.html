<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        function printTable() {
            let n = Number(prompt("Please enter a number"));

            for (let i = 0; i <= 10; i++) {
                console.log(`${n} X ${i} = ${n * i}`);
            }
        }

        printTable();
    </script>
</body>

</html>
