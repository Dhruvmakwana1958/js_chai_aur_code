<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a = 5 ; 
        let b = 6 ;

        let con1 = b > a ; //true
        let con2 = a==5 ; //ture
        console.log("con1 && con2 = ",con1 && con2); //     ---> true

        // true && true = true
        // true && false = false
        // false && true = false
        // false && false = false

        let con3 = b<a ; //false
        let con4 = b==10 ; //false
        console.log("con1 || con3 = ",con1 || con2); //     ---> true
        console.log("con3 || con4 = ",con3 || con4); //     ---> false

        // true && true = true
        // true && false = true
        // false && true = true
        // false && false = false

        console.log("!(b<a) = ",!(b<a));             //     ---> true


    </script>
</body>
</html>
