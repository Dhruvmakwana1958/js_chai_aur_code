<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let a = 5;
      let b = 2;
      let c = 5;
      let d = "2";

      console.log("a == c",a==c); //true [EQUAL TO]
      console.log("a != b", a!=b); //true [NOT EQUAL TO]
      console.log("b == d",b==d); //true because typeconversion is posible in js convert 2 which is string into number 
      console.log("b === d",b===d); //false [EQUAL & TYPE] -->  because this operator checks type also and it will not convert string to number
      console.log("b !== d",b!==d); //true [NOT-EQUAL & TYPE] 

    //   > 
    //   <
    //   >= 
    //   <= 


    </script>
  </body>
